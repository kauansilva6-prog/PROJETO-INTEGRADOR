<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>texto e formatação</title>
</head>
<body>
    <!--exempli 01 :exibir texto em negrito-->
    <P>usando a tag certa, voçe deixa seu <b>texto em negrito</b></P>

    <!--exempli 02 : destacar partes do texto -->
    <P>a última palavra da frase é <strong>destacar </strong></P>

    <!--exempli 03 :exibir palavra e trechos em itálico -->
    <P>a palavra a seguir será exibir em <i>itálico</i></P>

    <!--exeplo 04 :sublinhar trechos de textos -->
    <P>em diversar situações, é bom <U>sublinhar</U>uma palavra important</P>

    <!--exeplo 05 :tachar palavras -->
    <P>esta oferta é válida até <S>1° de novemblo</S> 1° dezemblo </P>

</body>
</html>
