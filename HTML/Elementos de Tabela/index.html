<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementos de Tabela</title>
</head>
<body>
    <h1>Elementos de Tabela</h1>
    <p>Os elementos de tabela em HTML são usados para organizar 
        dados em linhas e colunas, como uma planilha.
    </p>

    <table border="3">
        <caption>Tabela de Produtos</caption>
        <thead>
            <tr>
                <th>Produto</th>
                <th>Preço</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Teclado</td>
                <td>R$ 80,00</td>
            </tr>
            <tr>
                <td>Mouse</td>
                <td>R$ 20,00</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>Total</td>
                <td>R$ 100,00</td>
            </tr>
        </tfoot>
    </table>

    <!-- table = Define uma tabela -->
    <!-- tr = (Table Row) Define uma linha -->
    <!-- th = (Table Header) Define uma célula de cabeçalho -->
    <!-- td = (Table Data) Define uma célula comum -->
    <!-- thead, tbody, tfoot = Estrutura Semântica da tabela -->
</body>
</html>
