<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementos de Formulário</title>
</head>
<body>
    <h1>Elementos de Formulário</h1>
    <p>Os elementos de formulários em HTML permitem coletar dados do usuário (como login
        cadastro, pesquisa, etc.)
    </p>

    <form action="" method="">
        <fieldset>
            <legend>Contato</legend>

            <label for="nome">Nome:</label>
            <input id="nome" name="nome" type="text" required><br>

            <label for="email">Email</label>
            <input id="email" name="email" type="email" required><br>

            <label for="senha">Senha</label>
            <input id="senha" name="senha" type="password" required><br>

            <button type="submit">Enviar</button>
        </fieldset>
    </form>

    <!-- form: Inicio e fim do formulário -->
    <!-- input: campo de entrada (texto, número, email, senha e etc.) -->
    <!-- textarea: campo de texto longo -->
    <!-- label: Texto descritivo de campo -->
    <!-- select/option: Menu suspenso -->
    <!-- fieldset/legend: Agrupamento lógico -->
    <!-- button: botão de ação -->
</body>
</html>
